server:
  port: 8080

order:
  service:
    base-url: ${ORDER_SERVICE_BASE_URL:http://localhost:8081}

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      mvc:
        routes:
          - id: order-service
            uri: ${ORDER_SERVICE_BASE_URL:http://localhost:8081}
            predicates:
              - Path=/orders,/orders/**
